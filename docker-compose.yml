services:
  backend:
    build:
      context: ./backend
    container_name: ai-k8s-agent-backend
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - KUBECONFIG_PATH=${KUBECONFIG_PATH:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ai-k8s-agent-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
